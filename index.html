<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doug's Jukebox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #1c1410;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        padding: 48px 24px 64px;
      }

      header {
        text-align: center;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #f5d87a;
        text-transform: uppercase;
      }
      header p {
        margin-top: 6px;
        color: #9a8870;
        font-size: 0.9rem;
      }

      /* ── Toolbar ── */
      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: min(1200px, calc(100vw - 48px));
      }
      .btn-add {
        background: linear-gradient(135deg, #c5a85a, #e0c878);
        border: none;
        border-radius: 8px;
        padding: 11px 22px;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        color: #1c1410;
        transition: opacity 0.2s, transform 0.1s;
      }
      .btn-add:hover { opacity: 0.9; }
      .btn-add:active { transform: scale(0.98); }

      .btn-print {
        background: transparent;
        border: 1px solid #4a3820;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        color: #9a8870;
        transition: border-color 0.2s, color 0.2s;
      }
      .btn-print:hover {
        border-color: #c5a85a;
        color: #c5a85a;
      }

      /* ── Label grid ── */
      .label-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 32px;
        width: 100%;
        max-width: min(1200px, calc(100vw - 48px));
      }
      @media (max-width: 640px) {
        .label-grid { grid-template-columns: 1fr; }
      }

      /* ── Individual card ── */
      .label-card {
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .card-controls {
        background: #261e16;
        border: 1px solid #4a3820;
        border-bottom: none;
        border-radius: 10px 10px 0 0;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-fields {
        display: flex;
        flex: 1;
        gap: 6px;
        min-width: 0;
      }
      .card-input {
        background: #1c1410;
        border: 1px solid #3a2c1c;
        border-radius: 6px;
        color: #f0e0c0;
        padding: 6px 10px;
        font-size: 0.9rem;
        font-family: "EB Garamond", Georgia, serif;
        outline: none;
        flex: 1;
        min-width: 0;
        transition: border-color 0.15s;
      }
      .card-input::placeholder { color: #5a4830; }
      .card-input:focus { border-color: #c5a85a; }
      .card-input.artist { font-weight: 700; flex: 1.4; }

      .btn-remove {
        background: transparent;
        border: 1px solid #3a2c1c;
        border-radius: 6px;
        color: #6a5840;
        cursor: pointer;
        padding: 5px 9px;
        font-size: 0.8rem;
        line-height: 1;
        flex-shrink: 0;
        transition: border-color 0.15s, color 0.15s;
      }
      .btn-remove:hover {
        border-color: #a04030;
        color: #c05040;
      }

      .label-card svg {
        width: 100%;
        height: auto;
        display: block;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      /* ── Print ── */
      @media print {
        body {
          background: white;
          padding: 0;
          display: block;
        }
        header, .toolbar, .card-controls {
          display: none !important;
        }
        .label-grid {
          max-width: none;
          gap: 0;
        }
        .label-card svg {
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Doug's Jukebox</h1>
      <p>Add labels below, edit them directly, then print</p>
    </header>

    <div class="toolbar">
      <button class="btn-add" onclick="addLabel()">+ Add Label</button>
      <button class="btn-print" onclick="window.print()">&#128438;&nbsp; Print</button>
    </div>

    <div class="label-grid" id="labelGrid"></div>

    <script>
      let uid = 0;

      function makeLabelSvg(id) {
        const s6 = 'fill="none" stroke-width="0.6"';
        const oct = "18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39";
        return `<svg viewBox="-10 -10 241.1 91.86" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="c0-${id}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c1-${id}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c2-${id}"><rect fill="none" x="9.17" y="-.87" width="202.85" height="46.61"/></clipPath>
            <clipPath id="c3-${id}"><rect fill="none" x="9.17" y="18.96" width="202.85" height="26.78"/></clipPath>
          </defs>
          <g stroke="#777" stroke-width="0.35" fill="none">
            <line x1="-8" y1="0" x2="-2" y2="0"/><line x1="0" y1="-8" x2="0" y2="-2"/>
            <line x1="223.1" y1="0" x2="229.1" y2="0"/><line x1="221.1" y1="-8" x2="221.1" y2="-2"/>
            <line x1="-8" y1="71.86" x2="-2" y2="71.86"/><line x1="0" y1="73.86" x2="0" y2="79.86"/>
            <line x1="223.1" y1="71.86" x2="229.1" y2="71.86"/><line x1="221.1" y1="73.86" x2="221.1" y2="79.86"/>
          </g>
          <g clip-path="url(#c0-${id})">
            <rect fill="#ffedcb" width="221.1" height="71.86"/>
            <g clip-path="url(#c1-${id})">
              <line ${s6} stroke="#e4ae28" y1="4.22" x2="221.1" y2="4.22"/>
              <line ${s6} stroke="#e4ae28" y1="5.89" x2="221.1" y2="5.89"/>
              <line ${s6} stroke="#e4ae28" y1="7.57" x2="221.1" y2="7.57"/>
              <line ${s6} stroke="#e4ae28" y1="64.25" x2="221.1" y2="64.25"/>
              <line ${s6} stroke="#e4ae28" y1="65.92" x2="221.1" y2="65.92"/>
              <line ${s6} stroke="#e4ae28" y1="67.6" x2="221.1" y2="67.6"/>
              <g opacity="0.25" clip-path="url(#c2-${id})">
                <polygon fill="#fff" points="${oct}"/>
                <polygon ${s6} stroke="#fff" points="${oct}"/>
              </g>
              <g opacity="0.25" clip-path="url(#c3-${id})">
                <polygon fill="#009084" points="${oct}"/>
                <polygon ${s6} stroke="#009084" points="${oct}"/>
              </g>
              <line ${s6} stroke="#009084" x1="203.02" y1="32.73" x2="221.1" y2="32.73"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="34.39" x2="221.1" y2="34.39"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="36.06" x2="221.1" y2="36.06"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="37.72" x2="221.1" y2="37.72"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="39.38" x2="221.1" y2="39.38"/>
              <line ${s6} stroke="#009084" x1="0" y1="32.6" x2="18.17" y2="32.6"/>
              <line ${s6} stroke="#009084" x1="0" y1="34.27" x2="18.17" y2="34.27"/>
              <line ${s6} stroke="#009084" x1="0" y1="35.93" x2="18.17" y2="35.93"/>
              <line ${s6} stroke="#009084" x1="0" y1="37.6" x2="18.17" y2="37.6"/>
              <line ${s6} stroke="#009084" x1="0" y1="39.26" x2="18.17" y2="39.26"/>
            </g>
            <polygon ${s6} stroke="#009084" points="${oct}"/>
          </g>
          <text id="svgTA-${id}" x="110.55" y="21" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-style="italic" font-size="10" fill="#2a1a0e">\u00A0</text>
          <text id="svgA-${id}"  x="110.55" y="39.5" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-weight="700" font-size="11" fill="#2a1a0e">\u00A0</text>
          <text id="svgTB-${id}" x="110.55" y="57.5" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-style="italic" font-size="10" fill="#2a1a0e">\u00A0</text>
        </svg>`;
      }

      function addLabel() {
        const id = ++uid;
        const card = document.createElement("div");
        card.className = "label-card";
        card.dataset.id = id;
        card.innerHTML = `
          <div class="card-controls">
            <div class="card-fields">
              <input class="card-input" id="inTA-${id}" placeholder="A side" oninput="sync(${id})">
              <input class="card-input artist" id="inA-${id}" placeholder="Artist / Band" oninput="sync(${id})">
              <input class="card-input" id="inTB-${id}" placeholder="B side" oninput="sync(${id})">
            </div>
            <button class="btn-remove" onclick="removeCard(${id})" title="Remove">✕</button>
          </div>
          ${makeLabelSvg(id)}`;
        document.getElementById("labelGrid").appendChild(card);
        card.querySelector(".artist").focus();
      }

      function sync(id) {
        document.getElementById(`svgTA-${id}`).textContent = document.getElementById(`inTA-${id}`).value || "\u00A0";
        document.getElementById(`svgA-${id}`).textContent  = document.getElementById(`inA-${id}`).value  || "\u00A0";
        document.getElementById(`svgTB-${id}`).textContent = document.getElementById(`inTB-${id}`).value || "\u00A0";
      }

      function removeCard(id) {
        document.querySelector(`.label-card[data-id="${id}"]`).remove();
      }
    </script>
  </body>
</html>
