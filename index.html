<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doug's Jukebox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #1c1410;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 48px;
        padding: 48px 24px 64px;
      }

      header {
        text-align: center;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #f5d87a;
        text-transform: uppercase;
      }
      header p {
        margin-top: 6px;
        color: #9a8870;
        font-size: 0.9rem;
      }

      .form-panel {
        background: #261e16;
        border: 1px solid #4a3820;
        border-radius: 14px;
        padding: 32px 36px;
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-width: 0; /* 🔥 critical for Firefox */
      }
      .field label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #c5a85a;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        font-size: 0.65rem;
        font-weight: 700;
      }
      .badge-a {
        background: #c5a85a;
        color: #1c1410;
      }
      .badge-b {
        background: #009084;
        color: white;
      }
      .field input {
        background: #1c1410;
        border: 1px solid #4a3820;
        border-radius: 8px;
        color: #f0e0c0;
        padding: 11px 14px;
        font-size: 1rem;
        font-family: "EB Garamond", Georgia, serif;
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        width: 100%;
        box-sizing: border-box; /* ensures padding doesn't overflow */
      }
      .field input::placeholder {
        color: #5a4830;
      }
      .field input:focus {
        border-color: #c5a85a;
        box-shadow: 0 0 0 3px rgba(197, 168, 90, 0.15);
      }
      .field-row {
        display: flex;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .btn-generate {
        background: linear-gradient(135deg, #c5a85a, #e0c878);
        border: none;
        border-radius: 8px;
        padding: 13px 20px;
        font-size: 0.88rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        color: #1c1410;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }
      .btn-generate:hover {
        opacity: 0.9;
      }
      .btn-generate:active {
        transform: scale(0.98);
      }

      .preview-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
        pointer-events: none;
      }
      .preview-section.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: all;
      }
      .preview-label-text {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #9a8870;
      }

      .label-paper {
        background: white;
        padding: 30px 40px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }

      .btn-print {
        background: transparent;
        border: 1px solid #4a3820;
        border-radius: 8px;
        padding: 10px 24px;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        color: #9a8870;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-print:hover {
        border-color: #c5a85a;
        color: #c5a85a;
      }

      .staged-section {
        width: 100%;
        max-width: min(1200px, calc(100vw - 48px));
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .staged-section.visible {
        display: flex;
      }
      .staged-title {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #9a8870;
      }
      .staged-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        width: 100%;
      }
      @media (max-width: 640px) {
        .staged-grid {
          grid-template-columns: 1fr;
        }
      }
      .staged-card .label-paper {
        padding: 20px 28px;
      }
      .staged-card .label-paper svg {
        width: 100%;
        height: auto;
        display: block;
      }

      @media print {
        body {
          background: white;
          padding: 0;
          display: block;
        }
        header,
        .form-panel,
        #previewSection,
        .staged-title {
          display: none !important;
        }
        .staged-section {
          display: block !important;
          width: 100%;
          max-width: none;
        }
        .staged-grid {
          gap: 0;
        }
        .staged-card .label-paper {
          padding: 0;
          box-shadow: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Doug's Jukebox</h1>
      <p>Enter track details below to create your label</p>
    </header>

    <div class="form-panel">
      <div class="field">
        <label>Artist / Band</label>
        <input
          type="text"
          id="inputArtist"
          placeholder="e.g. Frank Sinatra"
          autocomplete="off"
        />
      </div>
      <div class="field-row">
        <div class="field">
          <label><span class="badge badge-a">A</span> Track</label>
          <input
            type="text"
            id="inputTrackA"
            placeholder="e.g. My Way"
            autocomplete="off"
          />
        </div>
        <div class="field">
          <label><span class="badge badge-b">B</span> Track</label>
          <input
            type="text"
            id="inputTrackB"
            placeholder="e.g. New York"
            autocomplete="off"
          />
        </div>
      </div>
      <button class="btn-generate" onclick="stageLabel()">
        Stage Label
      </button>
    </div>

    <div class="preview-section" id="previewSection">
      <span class="preview-label-text">Label Preview</span>
      <div class="label-paper">
        <!--
          Inlined from Label.svg (viewBox 0 0 221.1 71.86).
          ViewBox extended by 10 units on all sides to accommodate crop marks.

          Key coordinates from the SVG source:
            Octagon vertices: 18.47,32.39  →  202.72,32.39  →  202.72,39.47
                              197.71,44.43 ←  23.42,44.43  ←  18.47,39.47
                              23.43,27.42  →  197.82,27.42  (top edge)
            Band centre: x=110.55, y=35.93
            Top stripes:    y = 4.22, 5.89, 7.57   (amber #e4ae28)
            Bottom stripes: y = 64.25, 65.92, 67.6 (amber)
            Side lines:     5 teal lines each side, y = 32.6–39.26 / 32.73–39.38

          Text baseline positions (calculated):
            Track A — centred between stripe bottom (7.57) and band top (27.42)
                      midpoint 17.5  →  baseline y ≈ 21
            Artist  — centred in band (centre 35.93, cap-height offset +3.5)
                      baseline y ≈ 39.5
            Track B — centred between band bottom (44.43) and stripe top (64.25)
                      midpoint 54.3  →  baseline y ≈ 57.5
        -->
        <svg
          id="labelSvg"
          viewBox="-10 -10 241.1 91.86"
          width="578"
          height="220"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
        >
          <!-- ══ Crop / registration marks ══ -->
          <g stroke="#777" stroke-width="0.35" fill="none">
            <line x1="-8" y1="0" x2="-2" y2="0" />
            <!-- TL horiz -->
            <line x1="0" y1="-8" x2="0" y2="-2" />
            <!-- TL vert  -->
            <line x1="223.1" y1="0" x2="229.1" y2="0" />
            <!-- TR horiz -->
            <line x1="221.1" y1="-8" x2="221.1" y2="-2" />
            <!-- TR vert  -->
            <line x1="-8" y1="71.86" x2="-2" y2="71.86" />
            <!-- BL horiz -->
            <line x1="0" y1="73.86" x2="0" y2="79.86" />
            <!-- BL vert  -->
            <line x1="223.1" y1="71.86" x2="229.1" y2="71.86" />
            <!-- BR horiz -->
            <line x1="221.1" y1="73.86" x2="221.1" y2="79.86" />
            <!-- BR vert  -->
          </g>

          <!-- ══ Label.svg content (verbatim) ══ -->
          <defs>
            <style>
              .cls-1,
              .cls-2,
              .cls-3,
              .cls-4 {
                fill: none;
              }
              .cls-5 {
                fill: #ffedcb;
              }
              .cls-2 {
                stroke: #009084;
              }
              .cls-2,
              .cls-3,
              .cls-4 {
                stroke-width: 0.6px;
              }
              .cls-6 {
                clip-path: url(#clippath-1);
              }
              .cls-7 {
                clip-path: url(#clippath-3);
              }
              .cls-8 {
                clip-path: url(#clippath-2);
              }
              .cls-9 {
                fill: #fff;
              }
              .cls-10 {
                fill: #009084;
              }
              .cls-11 {
                opacity: 0.25;
              }
              .cls-3 {
                stroke: #e4ae28;
              }
              .cls-4 {
                stroke: #fff;
              }
              .cls-12 {
                clip-path: url(#clippath);
              }
            </style>
            <clipPath id="clippath">
              <rect class="cls-1" width="221.1" height="71.86" />
            </clipPath>
            <clipPath id="clippath-1">
              <rect class="cls-1" y="0" width="221.1" height="71.86" />
            </clipPath>
            <clipPath id="clippath-2">
              <rect
                class="cls-1"
                x="9.17"
                y="-.87"
                width="202.85"
                height="46.61"
              />
            </clipPath>
            <clipPath id="clippath-3">
              <rect
                class="cls-1"
                x="9.17"
                y="18.96"
                width="202.85"
                height="26.78"
              />
            </clipPath>
          </defs>

          <g class="cls-12">
            <rect class="cls-5" y="0" width="221.1" height="71.86" />
            <g class="cls-6">
              <!-- Amber stripes top -->
              <line class="cls-3" y1="4.22" x2="221.1" y2="4.22" />
              <line class="cls-3" y1="5.89" x2="221.1" y2="5.89" />
              <line class="cls-3" y1="7.57" x2="221.1" y2="7.57" />
              <!-- Amber stripes bottom -->
              <line class="cls-3" y1="64.25" x2="221.1" y2="64.25" />
              <line class="cls-3" y1="65.92" x2="221.1" y2="65.92" />
              <line class="cls-3" y1="67.6" x2="221.1" y2="67.6" />
              <!-- White octagon at 25% opacity -->
              <g class="cls-11">
                <g class="cls-8">
                  <polygon
                    class="cls-9"
                    points="18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39"
                  />
                  <polygon
                    class="cls-4"
                    points="18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39"
                  />
                </g>
              </g>
              <!-- Teal octagon at 25% opacity (creates sage-green blend effect) -->
              <g class="cls-11">
                <g class="cls-7">
                  <polygon
                    class="cls-10"
                    points="18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39"
                  />
                  <polygon
                    class="cls-2"
                    points="18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39"
                  />
                </g>
              </g>
              <!-- Teal side lines — right (5 parallel horizontal lines) -->
              <line
                class="cls-2"
                x1="203.02"
                y1="32.73"
                x2="221.1"
                y2="32.73"
              />
              <line
                class="cls-2"
                x1="203.02"
                y1="34.39"
                x2="221.1"
                y2="34.39"
              />
              <line
                class="cls-2"
                x1="203.02"
                y1="36.06"
                x2="221.1"
                y2="36.06"
              />
              <line
                class="cls-2"
                x1="203.02"
                y1="37.72"
                x2="221.1"
                y2="37.72"
              />
              <line
                class="cls-2"
                x1="203.02"
                y1="39.38"
                x2="221.1"
                y2="39.38"
              />
              <!-- Teal side lines — left -->
              <line class="cls-2" x1="0" y1="32.6" x2="18.17" y2="32.6" />
              <line class="cls-2" x1="0" y1="34.27" x2="18.17" y2="34.27" />
              <line class="cls-2" x1="0" y1="35.93" x2="18.17" y2="35.93" />
              <line class="cls-2" x1="0" y1="37.6" x2="18.17" y2="37.6" />
              <line class="cls-2" x1="0" y1="39.26" x2="18.17" y2="39.26" />
            </g>
            <!-- Teal octagon outline (full opacity) -->
            <polygon
              class="cls-2"
              points="18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39"
            />
          </g>

          <!-- ══ Text overlays ══
               Font: EB Garamond — closest free web match to Bookmania.
               x=110.55 is the horizontal centre of the 221.1-wide label.
               y values are SVG baselines calculated from the band geometry above.
          -->

          <!-- Track A: italic, centred between top stripes and band -->
          <text
            id="svgTrackA"
            x="110.55"
            y="21"
            text-anchor="middle"
            font-family="'EB Garamond', Georgia, serif"
            font-style="italic"
            font-size="10"
            fill="#2a1a0e"
          ></text>

          <!-- Artist: bold, centred inside the octagon band -->
          <text
            id="svgArtist"
            x="110.55"
            y="39.5"
            text-anchor="middle"
            font-family="'EB Garamond', Georgia, serif"
            font-weight="700"
            font-size="11"
            fill="#2a1a0e"
          ></text>

          <!-- Track B: italic, centred between band and bottom stripes -->
          <text
            id="svgTrackB"
            x="110.55"
            y="57.5"
            text-anchor="middle"
            font-family="'EB Garamond', Georgia, serif"
            font-style="italic"
            font-size="10"
            fill="#2a1a0e"
          ></text>
        </svg>
      </div>
      <button class="btn-print" onclick="window.print()">
        &#128438;&nbsp; Print Label
      </button>
    </div>

    <section class="staged-section" id="stagedSection">
      <span class="staged-title">Staged Labels</span>
      <div class="staged-grid" id="stagedGrid"></div>
    </section>

    <script>
      let stagedLabels = [];
      let labelCounter = 0;

      function generateLabel() {
        const artist = document.getElementById("inputArtist").value.trim();
        const trackA = document.getElementById("inputTrackA").value.trim();
        const trackB = document.getElementById("inputTrackB").value.trim();

        document.getElementById("svgArtist").textContent = artist || "\u00A0";
        document.getElementById("svgTrackA").textContent = trackA || "\u00A0";
        document.getElementById("svgTrackB").textContent = trackB || "\u00A0";

        document.getElementById("previewSection").classList.add("visible");
      }

      function makeLabelSvg(artist, trackA, trackB, uid) {
        const esc = (s) =>
          String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        const a = esc(artist) || "\u00A0";
        const ta = esc(trackA) || "\u00A0";
        const tb = esc(trackB) || "\u00A0";
        const stroke6 = 'fill="none" stroke-width="0.6"';
        const oct =
          "18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39";
        return `<svg viewBox="-10 -10 241.1 91.86" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="c0-${uid}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c1-${uid}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c2-${uid}"><rect fill="none" x="9.17" y="-.87" width="202.85" height="46.61"/></clipPath>
            <clipPath id="c3-${uid}"><rect fill="none" x="9.17" y="18.96" width="202.85" height="26.78"/></clipPath>
          </defs>
          <g stroke="#777" stroke-width="0.35" fill="none">
            <line x1="-8" y1="0" x2="-2" y2="0"/><line x1="0" y1="-8" x2="0" y2="-2"/>
            <line x1="223.1" y1="0" x2="229.1" y2="0"/><line x1="221.1" y1="-8" x2="221.1" y2="-2"/>
            <line x1="-8" y1="71.86" x2="-2" y2="71.86"/><line x1="0" y1="73.86" x2="0" y2="79.86"/>
            <line x1="223.1" y1="71.86" x2="229.1" y2="71.86"/><line x1="221.1" y1="73.86" x2="221.1" y2="79.86"/>
          </g>
          <g clip-path="url(#c0-${uid})">
            <rect fill="#ffedcb" width="221.1" height="71.86"/>
            <g clip-path="url(#c1-${uid})">
              <line ${stroke6} stroke="#e4ae28" y1="4.22" x2="221.1" y2="4.22"/>
              <line ${stroke6} stroke="#e4ae28" y1="5.89" x2="221.1" y2="5.89"/>
              <line ${stroke6} stroke="#e4ae28" y1="7.57" x2="221.1" y2="7.57"/>
              <line ${stroke6} stroke="#e4ae28" y1="64.25" x2="221.1" y2="64.25"/>
              <line ${stroke6} stroke="#e4ae28" y1="65.92" x2="221.1" y2="65.92"/>
              <line ${stroke6} stroke="#e4ae28" y1="67.6" x2="221.1" y2="67.6"/>
              <g opacity="0.25" clip-path="url(#c2-${uid})">
                <polygon fill="#fff" points="${oct}"/>
                <polygon ${stroke6} stroke="#fff" points="${oct}"/>
              </g>
              <g opacity="0.25" clip-path="url(#c3-${uid})">
                <polygon fill="#009084" points="${oct}"/>
                <polygon ${stroke6} stroke="#009084" points="${oct}"/>
              </g>
              <line ${stroke6} stroke="#009084" x1="203.02" y1="32.73" x2="221.1" y2="32.73"/>
              <line ${stroke6} stroke="#009084" x1="203.02" y1="34.39" x2="221.1" y2="34.39"/>
              <line ${stroke6} stroke="#009084" x1="203.02" y1="36.06" x2="221.1" y2="36.06"/>
              <line ${stroke6} stroke="#009084" x1="203.02" y1="37.72" x2="221.1" y2="37.72"/>
              <line ${stroke6} stroke="#009084" x1="203.02" y1="39.38" x2="221.1" y2="39.38"/>
              <line ${stroke6} stroke="#009084" x1="0" y1="32.6" x2="18.17" y2="32.6"/>
              <line ${stroke6} stroke="#009084" x1="0" y1="34.27" x2="18.17" y2="34.27"/>
              <line ${stroke6} stroke="#009084" x1="0" y1="35.93" x2="18.17" y2="35.93"/>
              <line ${stroke6} stroke="#009084" x1="0" y1="37.6" x2="18.17" y2="37.6"/>
              <line ${stroke6} stroke="#009084" x1="0" y1="39.26" x2="18.17" y2="39.26"/>
            </g>
            <polygon ${stroke6} stroke="#009084" points="${oct}"/>
          </g>
          <text x="110.55" y="21" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="10" fill="#2a1a0e">${ta}</text>
          <text x="110.55" y="39.5" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-weight="700" font-size="11" fill="#2a1a0e">${a}</text>
          <text x="110.55" y="57.5" text-anchor="middle" font-family="'EB Garamond', Georgia, serif" font-style="italic" font-size="10" fill="#2a1a0e">${tb}</text>
        </svg>`;
      }

      function stageLabel() {
        const artist = document.getElementById("inputArtist").value.trim();
        const trackA = document.getElementById("inputTrackA").value.trim();
        const trackB = document.getElementById("inputTrackB").value.trim();

        // Update live preview
        document.getElementById("svgArtist").textContent = artist || "\u00A0";
        document.getElementById("svgTrackA").textContent = trackA || "\u00A0";
        document.getElementById("svgTrackB").textContent = trackB || "\u00A0";
        document.getElementById("previewSection").classList.add("visible");

        // Add to staged list
        labelCounter++;
        stagedLabels.push({ id: labelCounter, artist, trackA, trackB });
        renderStagedLabels();
      }

      function renderStagedLabels() {
        const grid = document.getElementById("stagedGrid");
        const section = document.getElementById("stagedSection");
        grid.innerHTML = stagedLabels
          .map(
            (lbl) =>
              `<div class="staged-card">
                <div class="label-paper">${makeLabelSvg(lbl.artist, lbl.trackA, lbl.trackB, lbl.id)}</div>
              </div>`
          )
          .join("");
        section.classList.toggle("visible", stagedLabels.length > 0);
      }

      ["inputArtist", "inputTrackA", "inputTrackB"].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener("input", () => {
          if (
            document
              .getElementById("previewSection")
              .classList.contains("visible")
          )
            generateLabel();
        });
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") stageLabel();
        });
      });
    </script>
  </body>
</html>
