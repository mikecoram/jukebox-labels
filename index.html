<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doug's Jukebox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scrollbar-gutter: stable both-edges;
      }

      body {
        font-family: system-ui, sans-serif;
        background: #1c1410;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 36px;
        padding: 48px 24px calc(80px + env(safe-area-inset-bottom));
      }

      header {
        text-align: center;
      }
      header h1 {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #f5d87a;
        text-transform: uppercase;
      }
      header p {
        margin-top: 6px;
        color: #9a8870;
        font-size: 0.9rem;
      }

      /* ── Print bar ── */
      .print-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 24px max(16px, env(safe-area-inset-bottom));
        background: linear-gradient(to top, #1c1410 60%, rgba(28, 20, 16, 0));
        z-index: 10;
      }
      .btn-print {
        display: block;
        width: 100%;
        background: transparent;
        border: 1px solid #4a3820;
        border-radius: 10px;
        padding: 16px;
        font-size: 0.88rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        color: #9a8870;
        transition:
          border-color 0.2s,
          color 0.2s,
          background-color 0.2s;
      }
      .btn-print:hover {
        border-color: #c5a85a;
        color: #c5a85a;
        background-color: rgba(197, 168, 90, 0.05);
      }

      /* ── Label grid — always 1 column ── */
      .label-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 32px;
        width: 100%;
        max-width: min(700px, calc(100vw - 48px));
      }

      /* ── Individual card ── */
      .label-card {
        min-width: 0;
        container-type: inline-size;
      }

      /* ── Label wrapper (relative anchor for overlays) ── */
      .label-wrap {
        position: relative;
      }

      .label-wrap svg {
        width: 100%;
        height: auto;
        display: block;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }

      /* ── Direct-edit overlays ── */
      .label-overlays {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .label-input {
        position: absolute;
        pointer-events: all;
        left: 10%;
        width: 80%;
        padding: 0;
        line-height: 1;
        background: transparent;
        border: none;
        border-bottom: 1.5px solid transparent;
        outline: none;
        text-align: center;
        font-family: "EB Garamond", Georgia, serif;
        color: #2a1a0e;
        transition: border-color 0.15s;
      }
      .label-input::placeholder {
        color: rgba(42, 26, 14, 0.3);
      }
      .label-input:focus {
        border-bottom-color: rgba(0, 144, 132, 0.55);
      }

      /* Font sizes scale with label width via container query units:
         SVG font-size / viewBox-width = pt / 241.1 */
      .label-input.ta {
        top: 24%;
        font-size: 4.15cqw;
        font-style: italic;
      }
      .label-input.artist {
        top: 43%;
        font-size: 4.56cqw;
        font-weight: 700;
      }
      .label-input.tb {
        top: 63%;
        font-size: 4.15cqw;
        font-style: italic;
      }

      /* ── Remove button (top-right corner, reveals on hover) ── */
      .btn-remove {
        position: absolute;
        top: 5px;
        right: 5px;
        background: rgba(28, 20, 16, 0.75);
        border: 1px solid #3a2c1c;
        border-radius: 6px;
        color: #6a5840;
        cursor: pointer;
        padding: 4px 8px;
        font-size: 0.75rem;
        line-height: 1;
        opacity: 0;
        transition:
          opacity 0.15s,
          border-color 0.15s,
          color 0.15s,
          background-color 0.15s;
      }
      .label-wrap:hover .btn-remove {
        opacity: 1;
      }
      .btn-remove:hover {
        border-color: #a04030;
        color: #c05040;
      }
      .btn-remove[data-armed] {
        opacity: 1;
        border-color: #c05040;
        color: #c05040;
        background-color: rgba(192, 80, 64, 0.45);
      }

      /* ── Add placeholder ── */
      .add-placeholder {
        min-width: 0;
        aspect-ratio: 241.1 / 91.86;
        border: 2px dashed #3a2c1c;
        border-radius: 3px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #3a2c1c;
        font-size: 2rem;
        transition:
          border-color 0.2s,
          color 0.2s,
          background-color 0.2s;
      }
      .add-placeholder:hover {
        border-color: #8a6830;
        color: #8a6830;
        background-color: rgba(197, 168, 90, 0.05);
      }

      /* ── Print ── */
      @media print {
        body {
          background: white;
          padding: 0;
          display: block;
        }
        header,
        .print-bar,
        .label-overlays,
        .btn-remove,
        .add-placeholder {
          display: none !important;
        }
        .label-grid {
          max-width: none;
          gap: 0;
        }
        .label-card {
          container-type: normal; /* disable cqw in print */
        }
        .label-wrap svg {
          box-shadow: none;
        }
        /* Restore SVG text visibility for printing */
        .label-wrap text {
          fill: #2a1a0e;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Doug's Jukebox</h1>
      <p>Click a label to edit · Changes saved automatically</p>
    </header>

    <div class="print-bar">
      <button class="btn-print" onclick="window.print()" type="button">
        <span>Print</span>
      </button>
    </div>

    <div class="label-grid" id="labelGrid">
      <div class="add-placeholder" id="addPlaceholder" onclick="addLabel()">
        +
      </div>
    </div>

    <script>
      let uid = 0;
      const STORAGE_KEY = "jukebox-labels-v1";

      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function makeLabelSvg(id) {
        const s6 = 'fill="none" stroke-width="0.6"';
        const oct =
          "18.47 32.39 18.47 39.47 23.42 44.43 197.71 44.43 202.72 39.47 202.72 32.39 197.82 27.42 23.43 27.42 18.47 32.39";
        return `<svg viewBox="-10 -10 241.1 91.86" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="c0-${id}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c1-${id}"><rect fill="none" width="221.1" height="71.86"/></clipPath>
            <clipPath id="c2-${id}"><rect fill="none" x="9.17" y="-.87" width="202.85" height="46.61"/></clipPath>
            <clipPath id="c3-${id}"><rect fill="none" x="9.17" y="18.96" width="202.85" height="26.78"/></clipPath>
          </defs>
          <g stroke="#777" stroke-width="0.35" fill="none">
            <line x1="-8" y1="0" x2="-2" y2="0"/><line x1="0" y1="-8" x2="0" y2="-2"/>
            <line x1="223.1" y1="0" x2="229.1" y2="0"/><line x1="221.1" y1="-8" x2="221.1" y2="-2"/>
            <line x1="-8" y1="71.86" x2="-2" y2="71.86"/><line x1="0" y1="73.86" x2="0" y2="79.86"/>
            <line x1="223.1" y1="71.86" x2="229.1" y2="71.86"/><line x1="221.1" y1="73.86" x2="221.1" y2="79.86"/>
          </g>
          <g clip-path="url(#c0-${id})">
            <rect fill="#ffedcb" width="221.1" height="71.86"/>
            <g clip-path="url(#c1-${id})">
              <line ${s6} stroke="#e4ae28" y1="4.22" x2="221.1" y2="4.22"/>
              <line ${s6} stroke="#e4ae28" y1="5.89" x2="221.1" y2="5.89"/>
              <line ${s6} stroke="#e4ae28" y1="7.57" x2="221.1" y2="7.57"/>
              <line ${s6} stroke="#e4ae28" y1="64.25" x2="221.1" y2="64.25"/>
              <line ${s6} stroke="#e4ae28" y1="65.92" x2="221.1" y2="65.92"/>
              <line ${s6} stroke="#e4ae28" y1="67.6" x2="221.1" y2="67.6"/>
              <g opacity="0.25" clip-path="url(#c2-${id})">
                <polygon fill="#fff" points="${oct}"/>
                <polygon ${s6} stroke="#fff" points="${oct}"/>
              </g>
              <g opacity="0.25" clip-path="url(#c3-${id})">
                <polygon fill="#009084" points="${oct}"/>
                <polygon ${s6} stroke="#009084" points="${oct}"/>
              </g>
              <line ${s6} stroke="#009084" x1="203.02" y1="32.73" x2="221.1" y2="32.73"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="34.39" x2="221.1" y2="34.39"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="36.06" x2="221.1" y2="36.06"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="37.72" x2="221.1" y2="37.72"/>
              <line ${s6} stroke="#009084" x1="203.02" y1="39.38" x2="221.1" y2="39.38"/>
              <line ${s6} stroke="#009084" x1="0" y1="32.6" x2="18.17" y2="32.6"/>
              <line ${s6} stroke="#009084" x1="0" y1="34.27" x2="18.17" y2="34.27"/>
              <line ${s6} stroke="#009084" x1="0" y1="35.93" x2="18.17" y2="35.93"/>
              <line ${s6} stroke="#009084" x1="0" y1="37.6" x2="18.17" y2="37.6"/>
              <line ${s6} stroke="#009084" x1="0" y1="39.26" x2="18.17" y2="39.26"/>
            </g>
            <polygon ${s6} stroke="#009084" points="${oct}"/>
          </g>
          <text id="svgTA-${id}" x="110.55" y="21" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-style="italic" font-size="10" fill="transparent">\u00A0</text>
          <text id="svgA-${id}"  x="110.55" y="39.5" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-weight="700" font-size="11" fill="transparent">\u00A0</text>
          <text id="svgTB-${id}" x="110.55" y="57.5" text-anchor="middle" font-family="'EB Garamond',Georgia,serif" font-style="italic" font-size="10" fill="transparent">\u00A0</text>
        </svg>`;
      }

      function addLabel(ta, artist, tb) {
        ta = ta ?? "";
        artist = artist ?? "";
        tb = tb ?? "";
        const id = ++uid;
        const card = document.createElement("div");
        card.className = "label-card";
        card.dataset.id = id;
        card.innerHTML = `
          <div class="label-wrap">
            ${makeLabelSvg(id)}
            <div class="label-overlays">
              <input class="label-input ta"     id="inTA-${id}" placeholder="A side"        value="${esc(ta)}"     oninput="sync(${id}); save()">
              <input class="label-input artist"  id="inA-${id}"  placeholder="Artist / Band" value="${esc(artist)}" oninput="sync(${id}); save()">
              <input class="label-input tb"     id="inTB-${id}" placeholder="B side"        value="${esc(tb)}"     oninput="sync(${id}); save()">
            </div>
            <button class="btn-remove" onclick="removeCard(${id})" title="Remove">✕</button>
          </div>`;
        const grid = document.getElementById("labelGrid");
        grid.insertBefore(card, document.getElementById("addPlaceholder"));
        sync(id);
      }

      function sync(id) {
        document.getElementById(`svgTA-${id}`).textContent =
          document.getElementById(`inTA-${id}`).value || "\u00A0";
        document.getElementById(`svgA-${id}`).textContent =
          document.getElementById(`inA-${id}`).value || "\u00A0";
        document.getElementById(`svgTB-${id}`).textContent =
          document.getElementById(`inTB-${id}`).value || "\u00A0";
      }

      function removeCard(id) {
        const card = document.querySelector(`.label-card[data-id="${id}"]`);
        const btn = card.querySelector(".btn-remove");
        if (btn.dataset.armed) {
          clearTimeout(+btn.dataset.armed);
          card.remove();
          save();
        } else {
          btn.textContent = "✕?";
          btn.dataset.armed = setTimeout(() => {
            btn.textContent = "✕";
            delete btn.dataset.armed;
          }, 2000);
        }
      }

      /* ── localStorage persistence ── */

      function save() {
        const cards = [...document.querySelectorAll(".label-card[data-id]")];
        const data = cards.map((card) => {
          const id = card.dataset.id;
          return {
            ta: document.getElementById(`inTA-${id}`)?.value ?? "",
            artist: document.getElementById(`inA-${id}`)?.value ?? "",
            tb: document.getElementById(`inTB-${id}`)?.value ?? "",
          };
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (Array.isArray(data)) {
            data.forEach(({ ta, artist, tb }) => addLabel(ta, artist, tb));
          }
        } catch (e) {
          console.warn("Failed to restore labels:", e);
        }
      }

      loadFromStorage();
    </script>
  </body>
</html>
